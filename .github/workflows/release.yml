name: Pointerverse Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  linux-x86-64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ ninja-build libfmt-dev nlohmann-json3-dev libcli11-dev libssl-dev

      - name: Build Pointerverse
        run: |
          cmake -S . -B build -G Ninja -DPOINTERVERSE_BUILD_TESTS=OFF
          cmake --build build --target pointerverse

      - name: Package Linux binary
        run: |
          mkdir -p dist
          cp build/pointerverse dist/pointerverse
          tar -C dist -czf pointerverse-linux-x86_64.tar.gz pointerverse

      - name: Publish release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 \
            || gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
          gh release upload "$GITHUB_REF_NAME" pointerverse-linux-x86_64.tar.gz --clobber
